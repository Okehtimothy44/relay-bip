[project]
name = "relay-bip"
authors = ["Relay Protocol Team"]
description = "A decentralized cross-chain relay mechanism for secure token transfers"
telemetry = false
requirements = []
[contracts.relay-protocol]
path = "contracts/relay-protocol.clar"
depends_on = []

[repl]
costs_version = 2
parser_version = 2

[repl.analysis]
passes = ["check_checker"]

[repl.analysis.check_checker]
strict = false
trusted_sender = false
trusted_caller = false
callee_filter = false
